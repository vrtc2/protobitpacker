// Example schemas demonstrating protobitpacker annotations.
// This file is for documentation purposes; it is not part of the published API.

syntax = "proto3";

package bitpacker.v1.example;

import "bitpacker/v1/options.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/vrtc2/protobitpacker/gen/go/bitpacker/v1/example;examplev1";

// SensorReading demonstrates scalar, optional, and enum fields.
//
// Packed size (no label): 12 + 11 + 7 + 1 + 2 + 1(presence) = 34 bits → 5 bytes
// Standard protobuf (no label):                                          ≈ 10-14 bytes
message SensorReading {
  // Device ID: 0–4095
  uint32 sensor_id = 1 [(bitpacker.v1.field).bits = 12];

  // Temperature in units of 0.1 °C. Range: –512..511 (–51.2 °C to 51.1 °C)
  // sint32 zigzag ensures small negative values are efficient.
  sint32 temperature_deci = 2 [(bitpacker.v1.field).bits = 11];

  // Relative humidity 0–100 %
  uint32 humidity_pct = 3 [(bitpacker.v1.field).bits = 7];

  // Alert flag — bool defaults to 1 bit; no annotation required.
  bool alert = 4;

  // Operational status — 2 bits covers 4 enum values (0–3).
  SensorStatus status = 5 [(bitpacker.v1.field).bits = 2];

  // Optional human-readable label — up to 31 bytes.
  // 1-bit presence + 5-bit length + up to 31×8 bits of data.
  optional string label = 6 [(bitpacker.v1.field).length_bits = 5];
}

enum SensorStatus {
  SENSOR_STATUS_UNSPECIFIED = 0;
  SENSOR_STATUS_OK          = 1;
  SENSOR_STATUS_WARNING     = 2;
  SENSOR_STATUS_ERROR       = 3;
}

// Packet demonstrates oneof and nested message.
//
// Packed size (ack case): 2(selector) + 1(bool) = 3 bits → 1 byte
// Packed size (command case): 2(selector) + 8(uint32) = 10 bits → 2 bytes
message Packet {
  uint32 sequence = 1 [(bitpacker.v1.field).bits = 16];

  oneof payload {
    // 2 bits: 0=none, 1=raw, 2=command, 3=ack
    option (bitpacker.v1.oneof).selector_bits = 2;

    // Raw binary payload — up to 255 bytes.
    bytes raw = 2 [(bitpacker.v1.field).length_bits = 8];

    // Command opcode 0–255.
    uint32 command = 3 [(bitpacker.v1.field).bits = 8];

    // Acknowledgement flag.
    bool ack = 4;
  }

  // Optional nested message — tests that proto3 optional does not produce double presence bit.
  optional SensorReading last_reading = 5;
}

// Burst demonstrates repeated scalar and repeated message fields.
//
// Packed size for 4 readings: 8(count) + 4×34 = 144 bits → 18 bytes
// Standard protobuf for 4 readings:                        ≈ 56–72 bytes
message Burst {
  // Up to 255 readings per burst.
  repeated SensorReading readings = 1 [(bitpacker.v1.field).count_bits = 8];

  // Up to 15 raw ADC samples, each 12-bit unsigned.
  repeated uint32 adc_samples = 2 [
    (bitpacker.v1.field).count_bits = 4,
    (bitpacker.v1.field).bits = 12
  ];

  // Up to 7 string tags, each up to 31 bytes.
  repeated string tags = 3 [
    (bitpacker.v1.field).count_bits = 3,
    (bitpacker.v1.field).length_bits = 5
  ];
}

// Config demonstrates a map field.
//
// Encoding: 6(count) + per-entry×(5(key_length) + key_bytes×8 + 16(value)) bits
message Config {
  // Up to 63 key-value pairs; keys up to 31 bytes; values are 16-bit unsigned.
  map<string, uint32> settings = 1 [
    (bitpacker.v1.field).count_bits = 6,
    (bitpacker.v1.field).key_length_bits = 5,
    (bitpacker.v1.field).bits = 16
  ];
}

// TimestampedEvent demonstrates compact timestamp encoding.
//
//   updated_at:  64-bit signed seconds from Unix epoch (default, no annotation)
//   recorded_at: 26-bit unsigned seconds from 2026-01-01 — covers ~2 years, 4 bytes
//   event_ms:    32-bit signed milliseconds from 2026-01-01 — ~24 days range, 4 bytes
//   event_us:    40-bit signed microseconds from 2026-01-01 — ~6 days range, µs precision
//   event_ns:    32-bit signed nanoseconds from 2026-01-01 — ~2 seconds range, ns precision
//   optional_ts: proto3 optional, 64-bit signed Unix seconds
//
// Total (fields 1-3 present): 1+64 + 1+26 + 1+32 = 125 bits → 16 bytes
// Standard protobuf Timestamp × 3:                            ≈ 36 bytes
message TimestampedEvent {
  // Last update — 64-bit signed Unix seconds (smart default, no annotation needed).
  google.protobuf.Timestamp updated_at = 1;

  // Sensor reading timestamp — 26-bit unsigned seconds from 2026-01-01.
  // Range: [2026-01-01 .. ~2028-02-05] (2^26 − 1 ≈ 2.1 years in seconds).
  google.protobuf.Timestamp recorded_at = 2 [
    (bitpacker.v1.field).bits = 26,
    (bitpacker.v1.field).timestamp = {
      epoch_seconds: 1735689600,  // 2026-01-01T00:00:00Z
      forward_only: true
    }
  ];

  // Event time — 32-bit signed milliseconds from 2026-01-01.
  // Range: ±~24 days around the epoch.
  google.protobuf.Timestamp event_ms = 3 [
    (bitpacker.v1.field).bits = 32,
    (bitpacker.v1.field).timestamp = {
      epoch_seconds: 1735689600,  // 2026-01-01T00:00:00Z
      granularity: TIMESTAMP_GRANULARITY_MILLISECONDS
    }
  ];

  // Event time — 40-bit signed microseconds from 2026-01-01.
  // Range: ±~6 days around the epoch, microsecond precision.
  google.protobuf.Timestamp event_us = 4 [
    (bitpacker.v1.field).bits = 40,
    (bitpacker.v1.field).timestamp = {
      epoch_seconds: 1735689600,  // 2026-01-01T00:00:00Z
      granularity: TIMESTAMP_GRANULARITY_MICROSECONDS
    }
  ];

  // Event time — 32-bit signed nanoseconds from 2026-01-01.
  // Range: ±~2 seconds around the epoch, full nanosecond precision.
  google.protobuf.Timestamp event_ns = 5 [
    (bitpacker.v1.field).bits = 32,
    (bitpacker.v1.field).timestamp = {
      epoch_seconds: 1735689600,  // 2026-01-01T00:00:00Z
      granularity: TIMESTAMP_GRANULARITY_NANOSECONDS
    }
  ];

  // Optional timestamp using proto3 optional keyword — tests presence bit handling.
  // 64-bit signed Unix seconds (default encoding).
  optional google.protobuf.Timestamp optional_ts = 6;

  // Rolling 24-bit seconds — ~194 day window, 3 bytes wire (1 presence + 24 bits).
  // Decoder reconstructs from current wall-clock time; no epoch configuration needed.
  google.protobuf.Timestamp rolling_secs = 7 [
    (bitpacker.v1.field).bits = 24,
    (bitpacker.v1.field).timestamp = { rolling: true }
  ];

  // Rolling 16-bit seconds — ~18 hour window, 2 bytes wire (1 presence + 16 bits).
  // Minimal footprint for high-frequency telemetry.
  google.protobuf.Timestamp rolling_secs_16 = 8 [
    (bitpacker.v1.field).bits = 16,
    (bitpacker.v1.field).timestamp = { rolling: true }
  ];
}

// FloatSample demonstrates fixed-point decimal encoding for float and double fields.
//
// Uses fixed/ufixed instead of raw IEEE 754 bits for compact, human-scale precision.
//
//   temperature: 10 bits signed  → range –51.2..51.1 °C  (0.1 °C steps) — 1.25 bytes
//   distance:    16 bits unsigned → range   0..655.35 m   (0.01 m steps) — 2 bytes
//   altitude:    15 bits signed   → range –1638.4..1638.3 m (0.1 m steps) — 1.875 bytes
//
// Total: 41 bits → 6 bytes (vs ~20 bytes standard protobuf)
message FloatSample {
  // Ambient temperature in °C, 0.1 °C precision, –51.2..51.1 °C range.
  // Stored as signed 10-bit integer scaled by 10.
  float temperature = 1 [(bitpacker.v1.field) = {
    bits: 10,
    fixed: { decimal_places: 1 }
  }];

  // Distance in meters, 0.01 m precision, 0..655.35 m range.
  // Stored as unsigned 16-bit integer scaled by 100.
  float distance = 2 [(bitpacker.v1.field) = {
    bits: 16,
    ufixed: { decimal_places: 2 }
  }];

  // Altitude in meters (double), 0.1 m precision, –1638.4..1638.3 m range.
  // Stored as signed 15-bit integer scaled by 10.
  double altitude = 3 [(bitpacker.v1.field) = {
    bits: 15,
    fixed: { decimal_places: 1 }
  }];
}
