name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Go ${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.22', 'stable']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
      - if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=${{ github.event.pull_request.base.ref }}'
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - run: buf generate && git diff --exit-code gen/
